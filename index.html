<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevilla 2026 · Feria de Abril</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f7f3ee;
      --panel: rgba(255, 255, 255, 0.96);
      --text: #2a211d;
      --muted: #7b6d63;
      --border: #ddd1c4;
      --accent: #7b1f24;
      --accent-soft: rgba(123, 31, 36, 0.08);
      --ok: #1f7a4f;
      --ok-soft: #e7f4ec;
      --danger: #b42318;
      --danger-soft: #fdecea;
      --gold: #8b6a1d;
      --shadow: 0 10px 28px rgba(55, 36, 24, 0.08);
      --shadow-soft: 0 6px 18px rgba(55, 36, 24, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 14px 36px;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px 22px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-title,
    .header-title,
    .card-title {
      font-family: Georgia, "Times New Roman", serif;
    }

    .login-title {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 2rem;
    }

    .login-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .profile-list {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .profile-btn,
    .btn-add,
    .btn-gestion,
    .btn-logout {
      appearance: none;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
      font: inherit;
    }

    .profile-btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      background: white;
      color: var(--accent);
      border: 1px solid rgba(123, 31, 36, 0.18);
      font-weight: 700;
    }

    .profile-btn:hover {
      background: #fffafa;
      transform: translateY(-1px);
    }

    .app-shell {
      display: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .header-title {
      margin: 0 0 4px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.8rem;
    }

    .header-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .btn-logout {
      padding: 10px 16px;
      border-radius: 999px;
      background: white;
      color: var(--accent);
      border: 1px solid rgba(123, 31, 36, 0.18);
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      flex-shrink: 0;
    }

    .btn-logout:hover {
      transform: translateY(-1px);
    }

    .resumen-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: var(--shadow-soft);
    }

    .resumen-title {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .resumen-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .stat-pill strong {
      color: var(--accent);
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(123, 31, 36, 0.12);
      border-radius: 20px;
      padding: 18px 16px 16px;
      box-shadow: var(--shadow-soft);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      border-radius: 4px;
      background: linear-gradient(to bottom, var(--accent), #b05d4a);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding-left: 12px;
      margin-bottom: 12px;
    }

    .card-date {
      color: var(--gold);
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 5px;
      color: var(--accent);
    }

    .card-cartel {
      font-size: 0.95rem;
      color: var(--muted);
      font-style: italic;
      margin: 0;
      line-height: 1.45;
    }

    .libres-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tag-green {
      background: var(--ok-soft);
      color: var(--ok);
      border-color: rgba(31, 122, 79, 0.3);
    }

    .tag-red {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.25);
    }

    .nombres-container {
      display: grid;
      gap: 10px;
      padding-left: 12px;
    }

    .persona-row {
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(123, 31, 36, 0.08);
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .persona-row:hover {
      background: white;
      border-color: rgba(123, 31, 36, 0.16);
    }

    .persona-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 10px;
    }

    .persona-user {
      font-size: 0.72rem;
      color: var(--gold);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.87rem;
      background: #fff;
      border: 1px solid var(--border);
    }

    .chip.validado {
      background: var(--ok-soft);
      color: var(--ok);
      border-color: rgba(31, 122, 79, 0.28);
      font-weight: 700;
    }

    .gestion-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(123, 31, 36, 0.1);
      display: none;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-gestion {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 700;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-del {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .btn-ok {
      background: var(--ok);
      color: white;
      border-color: transparent;
    }

    .form-add {
      margin-top: 14px;
      padding: 14px 0 2px 12px;
      border-top: 1px solid rgba(123, 31, 36, 0.08);
    }

    .form-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: white;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(123, 31, 36, 0.45);
      box-shadow: 0 0 0 4px rgba(123, 31, 36, 0.08);
    }

    .btn-add {
      padding: 13px 18px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 24px 16px;
      background: rgba(255,255,255,0.82);
      border: 1px dashed rgba(123, 31, 36, 0.18);
      border-radius: 16px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 14px 12px 28px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .card-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-add {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login" class="login-wrap">
      <div class="login-box">
        <div class="eyebrow">Feria de Abril</div>
        <h1 class="login-title">Sevilla 2026</h1>
        <p class="login-subtitle">Selecciona tu perfil para entrar en la gestión de invitaciones.</p>
        <div id="perfiles" class="profile-list"></div>
      </div>
    </div>

    <div id="app" class="app-shell">
      <div class="header">
        <div class="header-left">
          <h1 id="user-title" class="header-title"></h1>
          <div class="header-subtitle">Gestión de solicitudes e invitaciones</div>
        </div>
        <button class="btn-logout" onclick="location.reload()">Salir</button>
      </div>

      <div id="resumen-concedidas"></div>
      <div id="lista-corridas" class="cards"></div>
    </div>
  </div>

  <script>
    const SB_URL = "https://ltmyegtxypgfdfjgjwmu.supabase.co";
    const SB_KEY = "sb_publishable_f-u-qWgvej9sugHj6yWYCA_GfVPAM5a";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let miUsuario = "";
    let intervalId = null;

    const perfiles = ["Mónica", "Reyes", "Salvador", "Papa&Mamá"];
    const hijos = ["Mónica", "Reyes", "Salvador"];

    document.getElementById("perfiles").innerHTML = perfiles
      .map((p) => `<button class="profile-btn" onclick="entrar('${p}')">${p}</button>`)
      .join("");

    function entrar(u) {
      miUsuario = u;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("user-title").innerText = u;
      render();

      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(render, 15000);
    }

    function formatFecha(fecha) {
      return new Date(fecha).toLocaleDateString("es-ES", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    async function render() {
      const { data: corridas, error } = await supabaseClient
        .from("gestor_toros")
        .select("*")
        .order("fecha");

      if (error) {
        document.getElementById("resumen-concedidas").innerHTML = "";
        document.getElementById("lista-corridas").innerHTML = `
          <div class="empty-state">No se han podido cargar los datos.</div>
        `;
        return;
      }

      if (!corridas || !corridas.length) {
        document.getElementById("resumen-concedidas").innerHTML = "";
        document.getElementById("lista-corridas").innerHTML = `
          <div class="empty-state">No hay corridas disponibles.</div>
        `;
        return;
      }

      const concedidasPorHijo = {
        "Mónica": 0,
        "Reyes": 0,
        "Salvador": 0
      };

      corridas.forEach(c => {
        const peticiones = c.peticiones || [];
        peticiones.forEach(p => {
          if (hijos.includes(p.usuario) && p.estado === "OK") {
            concedidasPorHijo[p.usuario] += (p.nombres?.length || 0);
          }
        });
      });

      document.getElementById("resumen-concedidas").innerHTML = `
        <div class="resumen-box">
          <div class="resumen-title">Concedidas acumuladas</div>
          <div class="resumen-grid">
            <div class="stat-pill">Mónica: <strong>${concedidasPorHijo["Mónica"]}</strong></div>
            <div class="stat-pill">Reyes: <strong>${concedidasPorHijo["Reyes"]}</strong></div>
            <div class="stat-pill">Salvador: <strong>${concedidasPorHijo["Salvador"]}</strong></div>
          </div>
        </div>
      `;

      let html = "";

      corridas.forEach(c => {
        const peticiones = c.peticiones || [];
        const countOK = peticiones
          .filter(p => p.estado === "OK")
          .reduce((acc, p) => acc + (p.nombres?.length || 0), 0);

        const libres = 4 - countOK;

        html += `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="card-date">${formatFecha(c.fecha)}</div>
                <div class="card-title">${c.titulo || ""}</div>
                <p class="card-cartel">${c.cartel || ""}</p>
              </div>
              <span class="libres-tag ${libres > 0 ? "tag-green" : "tag-red"}" title="Quedan ${libres} sitios">
                ${libres} libres
              </span>
            </div>

            <div class="nombres-container">
              ${
                peticiones.length
                  ? peticiones.map(p => {
                      const esMio = (p.usuario === miUsuario || miUsuario === "Papa&Mamá");
                      return `
                        <div class="persona-row" onclick="toggleGestion('${p.id}')">
                          <div class="persona-top">
                            <span class="persona-user">${(p.usuario || "").toUpperCase()}</span>
                            <div class="chips">
                              ${(p.nombres || []).map(n =>
                                `<span class="chip ${p.estado === "OK" ? "validado" : ""}">${n}</span>`
                              ).join("")}
                            </div>
                          </div>

                          ${
                            esMio ? `
                              <div id="gest-${p.id}" class="gestion-panel">
                                <button class="btn-gestion" onclick="editar(event, '${c.id}', '${p.id}')">Editar</button>
                                <button class="btn-gestion btn-del" onclick="borrar(event, '${c.id}', '${p.id}')">Borrar</button>
                                ${
                                  miUsuario === "Papa&Mamá" && p.estado === "PENDIENTE"
                                    ? `<button class="btn-gestion btn-ok" onclick="validar(event, '${c.id}', '${p.id}')">Validar</button>`
                                    : ""
                                }
                              </div>
                            ` : ""
                          }
                        </div>
                      `;
                    }).join("")
                  : `<div class="empty-state" style="padding:18px 14px;">Aún no hay solicitudes.</div>`
              }
            </div>

            ${
              libres > 0 ? `
                <div class="form-add">
                  <div class="form-row">
                    <input type="text" id="in-${c.id}" placeholder="Nombre del invitado..." />
                    <button class="btn-add" onclick="enviar('${c.id}')">Apuntar</button>
                  </div>
                </div>
              ` : ""
            }
          </div>
        `;
      });

      document.getElementById("lista-corridas").innerHTML = html;
    }

    function toggleGestion(id) {
      const el = document.getElementById("gest-" + id);
      if (!el) return;
      el.style.display = el.style.display === "flex" ? "none" : "flex";
    }

    async function enviar(cId) {
      const input = document.getElementById("in-" + cId);
      const val = input.value.trim();
      if (!val) return;

      const { data, error } = await supabaseClient
        .from("gestor_toros")
        .select("peticiones")
        .eq("id", cId)
        .single();

      if (error) return;

      const nuevas = [
        ...(data.peticiones || []),
        {
          id: Date.now().toString(),
          usuario: miUsuario,
          nombres: [val],
          estado: "PENDIENTE"
        }
      ];

      await supabaseClient
        .from("gestor_toros")
        .update({ peticiones: nuevas })
        .eq("id", cId);

      input.value = "";
      render();
    }

    async function borrar(e, cId, resId) {
      e.stopPropagation();
      if (!confirm("¿Borrar esta solicitud?")) return;

      const { data, error } = await supabaseClient
        .from("gestor_toros")
        .select("peticiones")
        .eq("id", cId)
        .single();

      if (error) return;

      const nuevas = (data.peticiones || []).filter(p => p.id !== resId);

      await supabaseClient
        .from("gestor_toros")
        .update({ peticiones: nuevas })
        .eq("id", cId);

      render();
    }

    async function editar(e, cId, resId) {
      e.stopPropagation();

      const { data, error } = await supabaseClient
        .from("gestor_toros")
        .select("peticiones")
        .eq("id", cId)
        .single();

      if (error) return;

      const peticion = (data.peticiones || []).find(p => p.id === resId);
      if (!peticion) return;

      const nuevo = prompt("Nuevo nombre:", peticion.nombres?.[0] || "");
      if (!nuevo || !nuevo.trim()) return;

      const nuevas = (data.peticiones || []).map(p =>
        p.id === resId ? { ...p, nombres: [nuevo.trim()] } : p
      );

      await supabaseClient
        .from("gestor_toros")
        .update({ peticiones: nuevas })
        .eq("id", cId);

      render();
    }

    async function validar(e, cId, resId) {
      e.stopPropagation();

      const { data, error } = await supabaseClient
        .from("gestor_toros")
        .select("peticiones")
        .eq("id", cId)
        .single();

      if (error) return;

      const peticion = (data.peticiones || []).find(p => p.id === resId);
      if (!peticion) return;

      const countOKActual = (data.peticiones || [])
        .filter(p => p.estado === "OK")
        .reduce((acc, p) => acc + (p.nombres?.length || 0), 0);

      const plazasPeticion = peticion.nombres?.length || 0;

      if (countOKActual + plazasPeticion > 4) {
        alert("No hay plazas suficientes para conceder esta petición.");
        return;
      }

      const nuevas = (data.peticiones || []).map(p =>
        p.id === resId ? { ...p, estado: "OK" } : p
      );

      await supabaseClient
        .from("gestor_toros")
        .update({ peticiones: nuevas })
        .eq("id", cId);

      render();
    }
  </script>
</body>
</html>
