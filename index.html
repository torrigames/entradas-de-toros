<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevilla 2026 · Gestión Familiar</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f6f2ec; --panel: #ffffff; --text: #231f1c; --muted: #6d655f;
            --border: #dfd4c8; --accent: #7b1f24; --ok: #1b7b4b; --ok-soft: #e8f6ee;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        h1 { color: var(--accent); font-family: serif; margin: 0; }
        
        /* Login */
        .login-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-perfil { padding: 15px; border: 2px solid var(--accent); background: white; color: var(--accent); border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Tarjetas */
        .card { background: var(--panel); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-date { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .card-title { font-size: 1.3rem; font-weight: 800; margin: 5px 0; font-family: serif; }
        .card-cartel { color: var(--muted); font-size: 0.95rem; margin-bottom: 15px; }

        /* Formulario */
        .form-reserva { background: #fbf8f4; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .btn-solicitar { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Peticiones */
        .peticion-item { padding: 8px 0; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .chip { background: #eee; padding: 2px 8px; border-radius: 10px; margin-left: 4px; font-size: 0.8rem; }
        .chip.ok { background: var(--ok-soft); color: var(--ok); border: 1px solid var(--ok); }
        .btn-ok { background: var(--ok); color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="pantalla-login" class="header">
        <h1>Sevilla 2026</h1>
        <p>¿Quién accede?</p>
        <div class="login-grid">
            <button class="btn-perfil" onclick="entrar('Mónica')">Mónica</button>
            <button class="btn-perfil" onclick="entrar('Reyes')">Reyes</button>
            <button class="btn-perfil" onclick="entrar('Salvador')">Salvador</button>
            <button class="btn-perfil" onclick="entrar('Papa&Mamá')">Papa & Mamá</button>
        </div>
    </div>

    <div id="pantalla-app" style="display:none;">
        <div class="header">
            <h1 id="user-title"></h1>
            <button onclick="location.reload()" style="border:none; background:none; color:var(--muted); text-decoration:underline; cursor:pointer;">Cambiar usuario</button>
        </div>
        <div id="lista-corridas">Cargando carteles...</div>
    </div>
</div>

<script>
    const SB_URL = "https://ltmyegtxypgfdfjgjwmu.supabase.co";
    const SB_KEY = "sb_publishable_f-u-qWgvej9sugHj6yWYCA_GfVPAM5a";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let usuarioActual = "";

    function entrar(user) {
        usuarioActual = user;
        document.getElementById('pantalla-login').style.display = 'none';
        document.getElementById('pantalla-app').style.display = 'block';
        document.getElementById('user-title').innerText = "Hola, " + user;
        render();
    }

    async function render() {
        const { data: corridas, error } = await supabaseClient.from('gestor_toros').select('*').order('fecha');
        if (error) return alert("Error al cargar: " + error.message);

        let html = "";
        corridas.forEach(c => {
            const p = c.peticiones || [];
            const ocupados = p.filter(x => x.estado === 'OK').reduce((acc, x) => acc + x.nombres.length, 0);
            const disponibles = 4 - ocupados;

            html += `
                <div class="card">
                    <div style="float:right; font-weight:bold; color:${disponibles > 0 ? 'var(--ok)' : 'red'}">
                        ${disponibles} LIBRES
                    </div>
                    <div class="card-date">${new Date(c.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'})}</div>
                    <div class="card-title">${c.titulo}</div>
                    <div class="card-cartel">${c.cartel}</div>
                    
                    <div class="lista-peticiones">
                        ${p.map(res => `
                            <div class="peticion-item">
                                <span>
                                    <strong>${res.usuario}:</strong> 
                                    ${res.nombres.map(n => `<span class="chip ${res.estado==='OK'?'ok':''}">${n}</span>`).join('')}
                                </span>
                                ${usuarioActual === 'Papa&Mamá' && res.estado === 'PENDIENTE' ? 
                                    `<button class="btn-ok" onclick="validar('${c.id}','${res.id}')">OK</button>` : ''}
                            </div>
                        `).join('')}
                    </div>

                    ${disponibles > 0 ? `
                        <div class="form-reserva" style="margin-top:10px;">
                            <div class="grid-inputs">
                                ${Array.from({length: disponibles}).map((_, i) => 
                                    `<input type="text" id="in-${c.id}-${i}" placeholder="Nombre ${i+1}">`
                                ).join('')}
                            </div>
                            <button class="btn-solicitar" onclick="solicitar('${c.id}', ${disponibles})">Solicitar Asientos</button>
                        </div>
                    ` : ''}
                </div>`;
        });
        document.getElementById('lista-corridas').innerHTML = html;
    }

    async function solicitar(cId, max) {
        const nombres = [];
        for(let i=0; i<max; i++) {
            const v = document.getElementById(`in-${cId}-${i}`).value.trim();
            if(v) nombres.push(v);
        }
        if(!nombres.length) return alert("Escribe al menos un nombre");

        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = [...(data.peticiones || []), {
            id: Date.now().toString(),
            usuario: usuarioActual,
            nombres: nombres,
            estado: usuarioActual === 'Papa&Mamá' ? 'OK' : 'PENDIENTE'
        }];

        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function validar(cId, pId) {
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const actualizadas = data.peticiones.map(p => p.id === pId ? {...p, estado: 'OK'} : p);
        await supabaseClient.from('gestor_toros').update({ peticiones: actualizadas }).eq('id', cId);
        render();
    }

    // Auto-refresco cada 15 segundos para ver cambios de otros
    setInterval(render, 15000);
</script>
</body>
</html>
