<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevilla 2026 · Gestión Familiar</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f6f2ec; --panel: #ffffff; --text: #231f1c; --muted: #6d655f;
            --border: #dfd4c8; --accent: #7b1f24; --ok: #1b7b4b; --gold: #936400;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            background-image: url('data:image/jpeg;base64,...(reemplazar con el cartel recortado en base64)...'); /* Se usaría una imagen recortada y desvaída */
            background-repeat: repeat;
            background-size: 300px;
            color: var(--text); 
            padding: 10px; 
            margin: 0; 
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; padding: 20px 0; position: relative; }
        .header h1 { font-family: 'Georgia', serif; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .btn-logout { position: absolute; top: 10px; right: 0; background: rgba(255, 255, 255, 0.8); border: 1px solid var(--border); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; color: var(--muted); cursor: pointer; }

        .card { 
            background: var(--panel); 
            border-radius: 12px; 
            border-left: 5px solid var(--accent); 
            padding: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            position: relative; 
            /* Toque decorativo del cartel en el borde */
            background-image: url('data:image/jpeg;base64,...(reemplazar con el borde del cartel)...');
            background-position: left center;
            background-repeat: no-repeat;
            background-size: 20px;
        }
        .card-date { color: var(--accent); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; margin-left: 15px; }
        .card-title { font-size: 1.15rem; font-family: 'Georgia', serif; font-weight: bold; margin: 4px 0 4px 15px; }
        .card-cartel { font-size: 0.9rem; color: var(--muted); line-height: 1.3; margin-left: 15px; }

        /* Etiquetas con Tooltip */
        .libres-tag { float: right; font-weight: bold; font-size: 0.75rem; padding: 3px 8px; border-radius: 5px; cursor: help; }
        .tag-green { background: #e8f6ee; color: var(--ok); }
        .tag-red { background: #fdecea; color: #b42318; }

        .nombres-container { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; margin-left: 15px; }
        
        /* Estilo de los nombres clicables */
        .persona-row { cursor: pointer; padding: 4px 0; border-radius: 4px; display: block; }
        .persona-row:hover { background: #fffaf0; }
        
        .chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; background: #f0f0f0; margin: 2px; border: 1px solid transparent; }
        .chip.validado { background: #e8f6ee; color: var(--ok); border-color: var(--ok); font-weight: bold; }
        .chip.pendiente { border: 1px dashed var(--gold); color: var(--gold); }

        /* Panel de gestión */
        .gestion-panel { background: #fdfaf5; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 8px; display: none; text-align: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn-gestion { background: white; border: 1px solid var(--border); padding: 8px 14px; margin: 4px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: bold; }
        .btn-edit { color: var(--gold); }
        .btn-del { color: #b42318; }
        .btn-ok { background: var(--ok); color: white; border: none; }

        .form-add { margin-top: 15px; background: #fcfcfc; border: 1px dashed var(--border); border-radius: 8px; padding: 10px; margin-left: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="login" style="text-align:center; padding-top:60px;">
        <h1 style="color:var(--accent); font-family:Georgia, serif;">SEVILLA 2026</h1>
        <p style="color:var(--muted)">Gestión Familiar de Entradas</p>
        <div id="perfiles" style="margin-top:30px"></div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <h1 id="user-title"></h1>
            <button class="btn-logout" title="Haz clic para salir y cambiar de usuario" onclick="location.reload()">Cambiar Perfil</button>
        </div>
        <div id="lista-corridas">Cargando la Feria...</div>
    </div>
</div>

<script>
    const SB_URL = "https://ltmyegtxypgfdfjgjwmu.supabase.co";
    const SB_KEY = "sb_publishable_f-u-qWgvej9sugHj6yWYCA_GfVPAM5a";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let miUsuario = "";
    const perfiles = ["Mónica", "Reyes", "Salvador", "Papa&Mamá"];
    
    document.getElementById('perfiles').innerHTML = perfiles.map(p => 
        `<button class="btn-add" style="margin-bottom:10px; background:white; color:var(--accent); border:2px solid var(--accent)" onclick="entrar('${p}')">${p}</button>`
    ).join('');

    function entrar(u) {
        miUsuario = u;
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-title').innerText = u;
        render();
        setInterval(render, 15000);
    }

    async function render() {
        const { data: corridas } = await supabaseClient.from('gestor_toros').select('*').order('fecha');
        if (!corridas) return;
        let html = "";

        corridas.forEach(c => {
            const peticiones = c.peticiones || [];
            const countOK = peticiones.filter(p => p.estado === 'OK').reduce((acc, p) => acc + p.nombres.length, 0);
            const libres = 4 - countOK;

            html += `
                <div class="card">
                    <span class="libres-tag ${libres > 0 ? 'tag-green' : 'tag-red'}" 
                          title="Quedan ${libres} de los 4 abonos oficiales para este día.">
                        ${libres} Libres
                    </span>
                    <div class="card-date">${new Date(c.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'})}</div>
                    <div class="card-title">${c.titulo}</div>
                    <div class="card-cartel">${c.cartel}</div>
                    
                    <div class="nombres-container">
                        ${peticiones.map(p => {
                            const esPropio = (p.usuario === miUsuario || miUsuario === 'Papa&Mamá');
                            const helpText = esPropio ? "Haz clic para editar o borrar esta petición." : "Petición de " + p.usuario;
                            const statusText = p.estado === 'OK' ? "Confirmada por Papa&Mamá" : "Pendiente de validación";

                            return `
                                <div class="persona-row" onclick="toggleGestion('${p.id}')" title="${helpText}">
                                    <strong style="font-size:0.75rem; color:var(--muted); text-transform:uppercase;">${p.usuario}:</strong>
                                    ${p.nombres.map(n => `<span class="chip ${p.estado==='OK' ? 'validado' : 'pendiente'}" title="${statusText}">${n}</span>`).join('')}
                                    
                                    ${esPropio ? `
                                        <div id="gest-${p.id}" class="gestion-panel">
                                            <p style="font-size:0.7rem; margin-top:0; color:var(--muted)">GESTIONAR PETICIÓN</p>
                                            <button class="btn-gestion btn-edit" onclick="editar('${c.id}','${p.id}')">EDITAR NOMBRE</button>
                                            <button class="btn-gestion btn-del" onclick="borrar('${c.id}','${p.id}')">BORRAR TODO</button>
                                            ${miUsuario === 'Papa&Mamá' && p.estado === 'PENDIENTE' ? 
                                                `<button class="btn-gestion btn-ok" onclick="validar('${c.id}','${p.id}')">VALIDAR AHORA</button>` : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    ${libres > 0 ? `
                        <div class="form-add">
                            <input type="text" id="in-${c.id}" placeholder="Escribe el nombre del invitado..." title="Escribe el nombre de la persona que quieres apuntar.">
                            <button class="btn-add" onclick="enviar('${c.id}')">APUNTAR ESTA ENTRADA</button>
                        </div>
                    ` : ''}
                </div>`;
        });
        document.getElementById('lista-corridas').innerHTML = html;
    }

    function toggleGestion(id) {
        const el = document.getElementById('gest-' + id);
        if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function enviar(cId) {
        const val = document.getElementById('in-' + cId).value.trim();
        if (!val) return;
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = [...(data.peticiones || []), { id: Date.now().toString(), usuario: miUsuario, nombres: [val], estado: 'PENDIENTE' }];
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function borrar(cId, resId) {
        event.stopPropagation();
        if(!confirm("¿Deseas eliminar esta petición definitivamente?")) return;
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = data.peticiones.filter(p => p.id !== resId);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function editar(cId, resId) {
        event.stopPropagation();
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const peticion = data.peticiones.find(p => p.id === resId);
        const nuevo = prompt("Modificar nombre del invitado:", peticion.nombres[0]);
        if (!nuevo) return;

        const nuevas = data.peticiones.map(p => p.id === resId ? {...p, nombres: [nuevo]} : p);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function validar(cId, resId) {
        event.stopPropagation();
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = data.peticiones.map(p => p.id === resId ? {...p, estado: 'OK'} : p);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }
</script>
</body>
</html>
