<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevilla 2026 · Feria de Abril</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #fdfaf5; --panel: rgba(255, 255, 255, 0.9); --text: #231f1c; 
            --border: #dfd4c8; --accent: #7b1f24; --ok: #1b7b4b; --gold: #936400;
        }
        
        body { 
            font-family: 'Segoe UI', serif; 
            background-color: var(--bg);
            /* Imagen de fondo tipo marca de agua */
            background-image: linear-gradient(rgba(253, 250, 245, 0.92), rgba(253, 250, 245, 0.92)), 
                              url('https://storage.googleapis.com/generate-v1-production/3b4df8/image_3b4df8.png');
            background-attachment: fixed;
            background-size: cover;
            color: var(--text); padding: 0; margin: 0; 
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        /* Decoración del Cartel en la cabecera */
        .banner-cartel {
            width: 100%;
            height: 140px;
            background-image: url('https://storage.googleapis.com/generate-v1-production/3b4df8/image_3b4df8.png');
            background-position: center 20%; /* Enfoca la parte de arriba del cartel */
            background-size: cover;
            border-bottom: 3px solid var(--accent);
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        .header h1 { 
            font-family: 'Georgia', serif; 
            color: var(--accent); 
            margin: 10px 0 0 0; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 1px 1px 0px white;
        }

        .card { 
            background: var(--panel); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            border-left: 6px solid var(--accent); 
            padding: 15px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
        }

        .card-date { color: var(--gold); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .card-title { font-size: 1.2rem; font-family: 'Georgia', serif; font-weight: bold; margin: 5px 0; color: var(--accent); }
        .card-cartel { font-size: 0.95rem; color: var(--muted); font-style: italic; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }

        .libres-tag { float: right; font-weight: bold; font-size: 0.75rem; padding: 4px 10px; border-radius: 5px; border: 1px solid; }
        .tag-green { background: #e8f6ee; color: var(--ok); border-color: var(--ok); }
        .tag-red { background: #fdecea; color: #b42318; border-color: #b42318; }

        /* Botones de gestión mejorados */
        .persona-row { cursor: pointer; padding: 8px; border-radius: 8px; margin-bottom: 4px; transition: 0.3s; background: rgba(240, 240, 240, 0.4); }
        .persona-row:hover { background: rgba(123, 31, 36, 0.05); }
        
        .chip { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.85rem; background: white; border: 1px solid #ccc; }
        .chip.validado { background: #e8f6ee; color: var(--ok); border-color: var(--ok); font-weight: bold; }

        .gestion-panel { background: white; border: 1px solid var(--accent); border-radius: 8px; padding: 12px; margin-top: 10px; display: none; }
        .btn-gestion { padding: 8px 12px; margin: 4px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: bold; border: 1px solid #ccc; background: white; }
        .btn-del { color: white; background: var(--accent); border: none; }
        .btn-ok { background: var(--ok); color: white; border: none; }

        .form-add { margin-top: 15px; text-align: center; }
        input { width: 80%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 80%; }
        
        /* Pantalla Login */
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="deco-header" class="banner-cartel" style="display:none;"></div>

<div class="container">
    <div id="login" style="text-align:center; padding-top:40px;">
        <div class="login-box">
            <img src="https://storage.googleapis.com/generate-v1-production/3b4df8/image_3b4df8.png" style="width: 100px; border-radius: 10px; margin-bottom: 15px;">
            <h1 style="color:var(--accent); font-family:Georgia, serif; margin:0;">SEVILLA 2026</h1>
            <p>Selecciona tu perfil</p>
            <div id="perfiles" style="margin-top:20px"></div>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <h1 id="user-title"></h1>
            <button class="btn-logout" onclick="location.reload()">SALIR</button>
        </div>
        <div id="lista-corridas"></div>
    </div>
</div>

<script>
    const SB_URL = "https://ltmyegtxypgfdfjgjwmu.supabase.co";
    const SB_KEY = "sb_publishable_f-u-qWgvej9sugHj6yWYCA_GfVPAM5a";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let miUsuario = "";
    const perfiles = ["Mónica", "Reyes", "Salvador", "Papa&Mamá"];
    
    document.getElementById('perfiles').innerHTML = perfiles.map(p => 
        `<button class="btn-add" style="margin-bottom:10px; background:white; color:var(--accent); border:2px solid var(--accent)" onclick="entrar('${p}')">${p}</button>`
    ).join('');

    function entrar(u) {
        miUsuario = u;
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('deco-header').style.display = 'block';
        document.getElementById('user-title').innerText = u;
        render();
        setInterval(render, 15000);
    }

    async function render() {
        const { data: corridas } = await supabaseClient.from('gestor_toros').select('*').order('fecha');
        let html = "";
        corridas.forEach(c => {
            const peticiones = c.peticiones || [];
            const countOK = peticiones.filter(p => p.estado === 'OK').reduce((acc, p) => acc + p.nombres.length, 0);
            const libres = 4 - countOK;

            html += `
                <div class="card">
                    <span class="libres-tag ${libres > 0 ? 'tag-green' : 'tag-red'}" title="Quedan ${libres} sitios">
                        ${libres} LIBRES
                    </span>
                    <div class="card-date">${new Date(c.fecha).toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'})}</div>
                    <div class="card-title">${c.titulo}</div>
                    <div class="card-cartel">${c.cartel}</div>
                    
                    <div class="nombres-container">
                        ${peticiones.map(p => {
                            const esMio = (p.usuario === miUsuario || miUsuario === 'Papa&Mamá');
                            return `
                                <div class="persona-row" onclick="toggleGestion('${p.id}')">
                                    <strong style="font-size:0.75rem; color:var(--gold)">${p.usuario.toUpperCase()}:</strong>
                                    ${p.nombres.map(n => `<span class="chip ${p.estado==='OK' ? 'validado' : ''}">${n}</span>`).join('')}
                                    
                                    ${esMio ? `
                                        <div id="gest-${p.id}" class="gestion-panel">
                                            <button class="btn-gestion" onclick="editar('${c.id}','${p.id}')">✎ EDITAR</button>
                                            <button class="btn-gestion btn-del" onclick="borrar('${c.id}','${p.id}')">✕ BORRAR</button>
                                            ${miUsuario === 'Papa&Mamá' && p.estado === 'PENDIENTE' ? 
                                                `<button class="btn-gestion btn-ok" onclick="validar('${c.id}','${p.id}')">✓ VALIDAR</button>` : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>

                    ${libres > 0 ? `
                        <div class="form-add">
                            <input type="text" id="in-${c.id}" placeholder="Nombre del invitado...">
                            <button class="btn-add" onclick="enviar('${c.id}')">APUNTAR</button>
                        </div>
                    ` : ''}
                </div>`;
        });
        document.getElementById('lista-corridas').innerHTML = html;
    }

    function toggleGestion(id) {
        const el = document.getElementById('gest-' + id);
        if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    async function enviar(cId) {
        const val = document.getElementById('in-' + cId).value.trim();
        if (!val) return;
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = [...(data.peticiones || []), { id: Date.now().toString(), usuario: miUsuario, nombres: [val], estado: 'PENDIENTE' }];
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function borrar(cId, resId) {
        event.stopPropagation();
        if(!confirm("¿Borrar?")) return;
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = data.peticiones.filter(p => p.id !== resId);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function editar(cId, resId) {
        event.stopPropagation();
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const peticion = data.peticiones.find(p => p.id === resId);
        const nuevo = prompt("Nuevo nombre:", peticion.nombres[0]);
        if (!nuevo) return;
        const nuevas = data.peticiones.map(p => p.id === resId ? {...p, nombres: [nuevo]} : p);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }

    async function validar(cId, resId) {
        event.stopPropagation();
        const { data } = await supabaseClient.from('gestor_toros').select('peticiones').eq('id', cId).single();
        const nuevas = data.peticiones.map(p => p.id === resId ? {...p, estado: 'OK'} : p);
        await supabaseClient.from('gestor_toros').update({ peticiones: nuevas }).eq('id', cId);
        render();
    }
</script>
</body>
</html>
